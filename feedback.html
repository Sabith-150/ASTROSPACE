<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTROSPACE - Feedback</title>
    <link rel="stylesheet" href="space.css">
    <link href="https://unpkg.com/boxicons/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">ASTROSPACE</div>
        <input type="checkbox" id="toggle-menu" class="toggle-menu">
        <label for="toggle-menu" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="light-year.html">Light-Year</a></li>
            <li><a href="feedback.html" class="active"><i class='bx bxs-star'></i></a></li>
        </ul>
    </nav>

    <div class="feedback-container">
        <h1>Rate ASTROSPACE!</h1>
        <div class="stars" id="star-rating">
            <i class='bx bxs-star' data-value="1"></i>
            <i class='bx bxs-star' data-value="2"></i>
            <i class='bx bxs-star' data-value="3"></i>
            <i class='bx bxs-star' data-value="4"></i>
            <i class='bx bxs-star' data-value="5"></i>
        </div>
        <form id="feedback-form">
            <label for="comments"></label>
            <textarea id="comments" rows="4" placeholder="What did you think of ASTROSPACE?" required></textarea>
            <button type="submit">Submit Feedback</button>
        </form>
        <div id="feedback-message"></div>
    </div>

    <script src="feedback.js"></script>
</body>
</html>
